services:
  chemfuse-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: chemfuse/chemfuse:latest
    ports:
      - "8501:8501"
    volumes:
      - chemfuse-cache:/app/.chemfuse
    environment:
      - CHEMFUSE_CACHE_DIR=/app/.chemfuse
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  chemfuse-cache:
    driver: local
